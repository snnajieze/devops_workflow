<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solomon App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
    }

    .card {
      text-align: center;
      background: white;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #2d6a4f;
    }

    p {
      color: #555;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Hello from Solomon's App!</h1>
    <p>Deployed on Kubernetes cluster <strong>DEMO_CLUSTER</strong></p>
    <p>Namespace: <strong>solomon-ns</strong></p>
  </div>
</body>

</html>
