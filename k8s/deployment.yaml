apiVersion: apps/v1
kind: Deployment
metadata:
  name: solomon-app
  namespace: solomon-ns
  labels:
    app: solomon-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solomon-app
  template:
    metadata:
      labels:
        app: solomon-app
    spec:
      containers:
        - name: solomon-app
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/solomon-app:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
